name: Apply product display refactor

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/product-spec-flavor-labels'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/product-spec-flavor-labels
          fetch-depth: 0
      - name: Rebuild and apply patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import gzip

          root = Path('.github/product-display-patch')
          hex_data = ''.join(path.read_text(encoding='utf-8').strip() for path in sorted(root.glob('hex*')))
          patch = gzip.decompress(bytes.fromhex(hex_data))
          Path('/tmp/product-display.patch').write_bytes(patch)
          PY
          patch -p1 < /tmp/product-display.patch
      - name: Validate syntax and focused tests
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            store-app.js \
            stock-adjustment-review.js \
            store-after-sales.js \
            store-delivery-note.js \
            store-order-detail-fix.js \
            store-qty-popup.js \
            store-stock-adjustment.js; do
            node --check "$file"
          done
          node --test \
            tests/product-display-label.test.mjs \
            tests/delivery-note-download.test.mjs \
            tests/mix-box.test.mjs \
            tests/stock-adjustment-pages.test.mjs \
            tests/inventory-movement-export.test.mjs \
            tests/stock-adjustment-core.test.mjs
      - name: Commit verified changes
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/product-display-patch
          rm -f .github/workflows/product-display-audit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: display product spec and flavor"
          git push origin HEAD:agent/product-spec-flavor-labels
