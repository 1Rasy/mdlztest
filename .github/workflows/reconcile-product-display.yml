name: Reconcile product display branch

on:
  push:
    branches:
      - agent/product-spec-flavor-labels

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/product-spec-flavor-labels
          fetch-depth: 0
      - name: Merge latest main and resolve product label conflict
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          if ! git merge --no-edit origin/main; then
            git checkout --theirs store-stock-adjustment.js
            python - <<'PY'
          from pathlib import Path
          path = Path('store-stock-adjustment.js')
          text = path.read_text(encoding='utf-8')
          old = 'item.product_name || item.product_barcode'
          new = 'StockAdjustmentCore.formatSpecFlavor(item) || item.product_barcode'
          if old not in text:
              raise SystemExit('Expected product_name fallback not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
            git add store-stock-adjustment.js tests/stock-adjustment-employee-ui.test.mjs
            if git diff --name-only --diff-filter=U | grep -q .; then
              echo "Unresolved merge conflicts remain"
              git diff --name-only --diff-filter=U
              exit 1
            fi
            git commit --no-edit
          fi
      - name: Validate merged result
        shell: bash
        run: |
          set -euo pipefail
          node --check store-stock-adjustment.js
          node --test \
            tests/product-display-label.test.mjs \
            tests/delivery-note-download.test.mjs \
            tests/mix-box.test.mjs \
            tests/stock-adjustment-pages.test.mjs \
            tests/stock-adjustment-employee-ui.test.mjs \
            tests/inventory-movement-export.test.mjs \
            tests/stock-adjustment-core.test.mjs
      - name: Remove temporary workflow and push
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/reconcile-product-display.yml
          git add -A
          git commit -m "chore: remove temporary reconciliation workflow"
          git push origin HEAD:agent/product-spec-flavor-labels
