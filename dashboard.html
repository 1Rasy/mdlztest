async function exportOrderExcel(){if(!window.XLSX){alert('Excel \u5bfc\u51fa\u7ec4\u4ef6\u52a0\u8f7d\u5931\u8d25\uff0c\u8bf7\u5237\u65b0\u9875\u9762\u540e\u91cd\u8bd5');return;}const orders=getFilteredOrders();if(!orders.length){alert('\u5f53\u524d\u7b5b\u9009\u6ca1\u6709\u53ef\u5bfc\u51fa\u7684\u5f00\u5355\u5355\u636e');return;}const orderNos=orders.map(function(o){return String(o.order_no||'');}).filter(Boolean);if(!orderNos.length){alert('\u5f53\u524d\u5355\u636e\u7f3a\u5c11\u8ba2\u5355\u53f7\uff0c\u65e0\u6cd5\u5bfc\u51fa\u660e\u7ec6');return;}const itemRes=await client.from('sales_order_items').select('order_no, barcode, product_name, unit_price, qty, amount, sale_unit, sale_qty, sale_unit_price').in('order_no',orderNos);if(itemRes.error){console.error(itemRes.error);alert('\u5f00\u5355\u660e\u7ec6\u52a0\u8f7d\u5931\u8d25\uff1a'+itemRes.error.message);return;}const items=itemRes.data||[];const barcodes=Array.from(new Set(items.map(function(i){return String(i.barcode||'');}).filter(Boolean)));let productMap=new Map();if(barcodes.length){const productRes=await client.from('products').select('barcode, name, brand, spec, flavor, pcs_per_box').in('barcode',barcodes);if(productRes.error){console.error(productRes.error);alert('\u5546\u54c1\u8d44\u6599\u52a0\u8f7d\u5931\u8d25\uff1a'+productRes.error.message);return;}productMap=new Map((productRes.data||[]).map(function(p){return[String(p.barcode||''),p];}));}const orderMap=new Map(orders.map(function(o){return[String(o.order_no||''),o];}));const agg=new Map();items.forEach(function(item){const o=orderMap.get(String(item.order_no||''));if(!o)return;const bc=String(item.barcode||''),p=productMap.get(bc),saleUnit=String(item.sale_unit||'散'),saleQty=Number(item.sale_qty ?? item.qty ?? 0),salePrice=Number(item.sale_unit_price ?? item.unit_price ?? 0),amount=Number(item.amount||0),isMix=saleUnit==='拼盒',mixSize=Number(p?.pcs_per_box||0)||1,mixKey=isMix?String(o.order_no)+'|MIX|'+(p?.brand||'')+'|'+(p?.spec||''):'',key=mixKey||String(o.order_no)+'|'+bc;if(!agg.has(key)){const code=String(o.employee_code||''),emp=dashboardEmployeeMap.get(code);agg.set(key,{isMix:isMix,spec:String(p?.spec||'').trim(),flavors:new Set(),storeKey:String(o.atom_code||'')+'|'+(o.store_name||''),date:formatDateOnly(o.created_at),empName:emp?.name||code,empCode:code,atom:String(o.atom_code||''),store:o.store_name||'',product:isMix?'':exportProductName(p,item),barcode:isMix?'':bc,wholeQty:0,wholePrice:'',looseQty:0,loosePrice:'',amount:0});}const r=agg.get(key);if(isMix){r.wholeQty+=saleQty/mixSize;r.wholePrice=salePrice;if(p?.flavor)r.flavors.add(String(p.flavor).trim());}else if(saleUnit==='整'){r.wholeQty+=saleQty;r.wholePrice=salePrice;}else{r.looseQty+=saleQty;r.loosePrice=salePrice;}r.amount+=amount;});const rows=Array.from(agg.values()).map(function(r){if(r.isMix){const flavorText=Array.from(r.flavors).filter(Boolean).join('/');r.product=(r.spec+flavorText).trim()||r.spec||'拼盒商品';}return r;}).sort(function(a,b){return a.storeKey.localeCompare(b.storeKey,'zh-CN',{numeric:true})||a.date.localeCompare(b.date)||a.product.localeCompare(b.product,'zh-CN',{numeric:true});});if(!rows.length){alert('\u5f53\u524d\u7b5b\u9009\u6ca1\u6709\u5f00\u5355\u660e\u7ec6\u53ef\u5bfc\u51fa');return;}const headers=['\u5f00\u5355\u65e5\u671f','\u5458\u5de5','\u5458\u5de5\u53f7','\u95e8\u5e97\u7f16\u53f7','\u95e8\u5e97','\u5546\u54c1\u540d','\u6761\u7801','\u6574\u6570','\u6574\u4ef7','\u6563\u6570','\u6563\u4ef7','\u91d1\u989d'];const toData=function(sheetRows){return[headers].concat(sheetRows.map(function(r){return[r.date,r.empName,r.empCode,r.atom,r.store,r.product,r.barcode,r.wholeQty||'',r.wholePrice===''?'':Number(r.wholePrice),r.looseQty||'',r.loosePrice===''?'':Number(r.loosePrice),Number(r.amount.toFixed(2))];}));};const normalRows=rows.filter(function(r){return !String(r.atom||'').startsWith('NEW_');}),offlineRows=rows.filter(function(r){return String(r.atom||'').startsWith('NEW_');});const wb=XLSX.utils.book_new();const no
