<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>吉能出库单导入</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;margin:0;padding:40px 20px;background:#f8f9fa;color:#212529}.container{max-width:720px;margin:40px auto}.card{background:#fff;padding:32px;border-radius:10px;border:1px solid #dee2e6;box-shadow:0 4px 12px rgba(0,0,0,.03)}h2{margin:0 0 12px;font-size:19px;font-weight:700;border-bottom:2px solid #4A154B;padding-bottom:10px}.sub,.map{font-size:13px;color:#6c757d;line-height:1.6}.map{margin-top:14px;padding:12px;border:1px solid #eee;border-radius:6px;background:#fafafa}.upload{border:1px dashed #dee2e6;background:#fff;padding:45px 20px;border-radius:8px;cursor:pointer;text-align:center;position:relative}.upload.dragover,.upload:hover{border-color:#4A154B;background:#fdfafd}.file{position:absolute;inset:0;opacity:0;cursor:pointer}.info{margin-top:18px;padding:12px;background:#e8f5e9;border:1px solid #c8e6c9;border-radius:6px;font-size:14px;color:#2e7d32;display:none}.btn{margin-top:20px;width:100%;background:#4A154B;color:#fff;border:none;padding:13px;border-radius:6px;font-size:15px;font-weight:700}.btn:disabled{background:#ced4da}.status{margin-top:15px;font-size:13px;font-weight:700;color:#4A154B;text-align:center;white-space:pre-line}.error{color:#b91c1c}.back{display:inline-block;margin-bottom:14px;color:#4A154B;font-size:13px;font-weight:700;text-decoration:none}.hide{display:none!important}
</style>
</head>
<body>
<div class="container"><a class="back" href="stock_import.html">← 返回经销商选择</a><div class="card"><h2>吉能出库单导入</h2><p class="sub">沿用原 stock_import 固定列规则，只导入 dealer_employee_mappings 已映射客户。</p><div id="dropZone" class="upload"><div style="font-size:13px;color:#6c757d">点击选择文件，或拖拽 Excel 到这里</div><input id="excelFile" class="file" type="file" accept=".xlsx,.xls"></div><div class="map"><strong>固定列：</strong>A单号、C制单日期、D客户编号、E客户、G条形码、H商品名称、I包装、J件、L散。</div><div id="fileInfo" class="info">已选择文件：<span id="fileName"></span></div><button id="submitBtn" class="btn" disabled onclick="startImport()">确认导入数据库</button><div id="statusMsg" class="status hide"></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://wyjbnnqhiehjccmojbbg.supabase.co";
const SUPABASE_KEY="sb"+"_publishable_WwTC7079N2e8ZQwPKUj-Gw_ewFiviFG";
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const CFG={prefix:'JN',hint:'A单号、D客户编号、G条形码',cols:{order_no:0,bill_date:2,customer_code:3,customer_name:4,barcode:6,product_name:7,package_reg:8,qty_piece:9,qty_scatter:11},required:[0,3,6]};
const SPECIAL={"6924513908032":1,"6924513908001":1,"6924513909244":1,"6924513909268":1,"6924513902283":1,"6924513908063":1};
const dz=document.getElementById('dropZone'),fi=document.getElementById('excelFile'),info=document.getElementById('fileInfo'),fn=document.getElementById('fileName'),btn=document.getElementById('submitBtn'),msg=document.getElementById('statusMsg');let selectedFile=null;
['dragenter','dragover','dragleave','drop'].forEach(x=>dz.addEventListener(x,e=>{e.preventDefault();e.stopPropagation()},false));['dragenter','dragover'].forEach(x=>dz.addEventListener(x,()=>dz.classList.add('dragover'),false));['dragleave','drop'].forEach(x=>dz.addEventListener(x,()=>dz.classList.remove('dragover'),false));dz.addEventListener('drop',e=>{if(e.dataTransfer.files.length)pick(e.dataTransfer.files[0])});fi.addEventListener('change',e=>{if(e.target.files.length)pick(e.target.files[0])});
function pick(file){const ext=file.name.split('.').pop().toLowerCase();if(ext!=='xlsx'&&ext!=='xls'){alert('文件格式错误，请选择 .xlsx 或 .xls');return}selectedFile=file;fn.innerText=file.name;info.style.display='block';btn.disabled=false;msg.classList.add('hide');msg.classList.remove('error')}
function status(t,err=false){msg.classList.remove('hide');msg.classList.toggle('error',err);msg.innerText=t}function text(v){return v==null?'':String(v).trim()}function num(v){const s=text(v).replace(/,/g,'');if(!s)return 0;const n=Number(s);return Number.isFinite(n)?n:0}function barcode(v){let s=text(v);if(!s)return'';if(/^[0-9]+(\.0+)?$/.test(s))return s.replace(/\.0+$/,'');const n=Number(s);if(Number.isFinite(n)&&/e\+?/i.test(s))return String(Math.trunc(n));return s}function dateText(v){return text(v).replace(/\//g,'-').replace(/\s+/g,' ')}function safe(v){return text(v).replace(/\s+/g,' ').replace(/[|]/g,'/')}function bad(v){const s=text(v).toLowerCase();return !s||s==='undefined'||s==='null'}
function normRow(c){c=Array.isArray(c)?c:[];const first=text(c[0]);const miss=CFG.required.some(i=>c[i]===undefined);if(first.includes('\t')&&(c.length<=2||miss))return first.split('\t');return c}function any(c){return normRow(c).some(x=>text(x)!=='')}function header(c){const j=normRow(c).map(text).join('|').toLowerCase();return (j.includes('客户')||j.includes('customer'))&&(j.includes('条形码')||j.includes('barcode'))&&(j.includes('单号')||j.includes('order'))}function dataRows(rows){const a=(rows||[]).map((cells,i)=>({cells:cells||[],sourceRowNo:i+1})).filter(r=>any(r.cells));return a.length&&header(a[0].cells)?a.slice(1):a}
async function whitelist(){status('正在读取客户编号白名单...');const {data,error}=await client.from('dealer_employee_mappings').select('customer_code,employee_code').not('customer_code','is',null).not('employee_code','is',null);if(error)throw error;const set=new Set();(data||[]).forEach(r=>{const c=text(r.customer_code),e=text(r.employee_code);if(c&&e)set.add(c)});if(!set.size)throw new Error('dealer_employee_mappings 里没有可用的客户编号白名单');return set}
function makeRow(c,batch,rowNo){c=normRow(c);const r={import_batch_id:batch,is_processed:false,source_row_no:rowNo,order_no:text(c[CFG.cols.order_no]),bill_date:dateText(c[CFG.cols.bill_date]),customer_code:text(c[CFG.cols.customer_code]),customer_name:text(c[CFG.cols.customer_name]),barcode:barcode(c[CFG.cols.barcode]),product_name:text(c[CFG.cols.product_name]),package_reg:num(c[CFG.cols.package_reg]),qty_piece:num(c[CFG.cols.qty_piece]),qty_scatter:num(c[CFG.cols.qty_scatter])};r.is_triple_spec_direct=!!SPECIAL[r.barcode];return r}
function build(rows,set){const batch=CFG.prefix+'_'+Date.now(),occ=new Map(),seen=new Set(),payload=[],invalid=[];let skipBad=0,skipMap=0,skipDup=0;const list=dataRows(rows);list.forEach(row=>{const r=makeRow(row.cells,batch,row.sourceRowNo);if(bad(r.order_no)||bad(r.barcode)||bad(r.customer_code)){skipBad++;if(invalid.length<5)invalid.push(`第${row.sourceRowNo}行：单号=${r.order_no||'空'}，客户编号=${r.customer_code||'空'}，条码=${r.barcode||'空'}`);return}if(!set.has(r.customer_code)){skipMap++;return}const base=`${safe(r.order_no)}|${safe(r.barcode)}`,seq=(occ.get(base)||0)+1;occ.set(base,seq);r.duplicate_seq=seq;r.row_key=[safe(r.order_no),safe(r.barcode),seq].join('|');if(seen.has(r.row_key)){skipDup++;return}seen.add(r.row_key);payload.push(r)});return{payload,total:list.length,skipBad,skipMap,skipDup,invalid}}
async function upsertChunks(rows){for(let i=0;i<rows.length;i+=500){const part=rows.slice(i,i+500);status(`正在写入数据库 ${Math.min(i+part.length,rows.length)} / ${rows.length} 条...`);const {error}=await client.from('raw_dealer_outbounds').upsert(part,{onConflict:'row_key'});if(error)throw error;await new Promise(r=>setTimeout(r,0))}}
function startImport(){if(!selectedFile)return;btn.disabled=true;status('正在解析 Excel 数据...');const reader=new FileReader();reader.onload=async e=>{try{const set=await whitelist();const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:'yyyy-mm-dd hh:mm:ss',blankrows:false});if(!rows||!rows.length)throw new Error('Excel 未包含任何可读取内容');const r=build(rows,set);if(!r.payload.length){const sample=r.invalid.length?'\n\n无效行示例：\n'+r.invalid.join('\n'):'';throw new Error(`有效行解析为0。原始数据 ${r.total} 行，未匹配白名单 ${r.skipMap} 行，无效行 ${r.skipBad} 行。请检查 ${CFG.hint} 是否在固定列。${sample}`)}status(`原始数据 ${r.total} 行\n白名单命中 ${r.payload.length} 行\n跳过非车销客户 ${r.skipMap} 行\n跳过无效行 ${r.skipBad} 行\n正在写入...`);await upsertChunks(r.payload);status(`数据导入完成。\n原始数据 ${r.total} 行，实际导入 ${r.payload.length} 行。`);alert(`导入成功，共处理 ${r.payload.length} 条车销有效记录`);info.style.display='none';selectedFile=null}catch(err){console.error(err);status('导入失败：'+(err.message||err),true);alert('导入失败：'+(err.message||err))}finally{btn.disabled=false}};reader.readAsArrayBuffer(selectedFile)}
</script>
</body>
</html>
