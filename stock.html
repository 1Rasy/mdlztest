<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>库存管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
:root { --primary:#4A154B; --primary-hover:#360f37; --accent:#ffb81c; --bg-main:#f4f2f5; --text-main:#1f1121; --text-muted:#756676; --card-bg:#ffffff; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; margin:0; background:var(--bg-main); color:var(--text-main); padding-bottom:90px; -webkit-tap-highlight-color:transparent; }
.card { background:var(--card-bg); margin:12px; padding:16px; border-radius:12px; box-shadow:0 4px 12px rgba(74,21,75,0.03); position:relative; }
.top-action-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.back-btn { display:inline-flex; align-items:center; justify-content:center; background:#f4f2f5; color:var(--text-main); padding:10px 18px; border-radius:20px; font-size:14px; font-weight:600; cursor:pointer; border:1px solid #e2dde3; transition:all .2s; }
.back-btn::before { content:"←"; margin-right:6px; font-weight:bold; font-size:16px; }
.big-store-title { font-size:22px; font-weight:800; color:#111827; margin:4px 0 14px 0; letter-spacing:-.5px; }
.sub { font-size:13px; color:var(--text-muted); margin-top:2px; }
.search-wrapper { position:relative; margin:4px 0 12px 0; width:100%; box-sizing:border-box; }
.search-wrapper input { width:100%; padding:12px; margin:0; border:1px solid #dcd6dd; border-radius:8px; box-sizing:border-box; font-size:16px; background:#faf9fa; }
.brand-nav { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 6px 0; }
.brand-badge { background:#f4f2f5; color:var(--text-muted); padding:7px 14px; border-radius:20px; font-size:13px; cursor:pointer; font-weight:600; border:1px solid transparent; }
.brand-badge.active { background:#fbf4fc; color:var(--primary); border:1px solid #eecbf5; }
.spec-nav { display:flex; flex-wrap:wrap; gap:6px; margin:4px 0 12px 0; padding:6px 0; border-bottom:1px dashed #e2dde3; }
.spec-badge { background:#fff; color:#665c67; padding:4px 10px; border-radius:6px; font-size:12px; cursor:pointer; border:1px solid #e2dde3; font-weight:500; }
.spec-badge.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.stock-row { display:flex; flex-direction:column; width:100%; background:#faf9fa; padding:12px; border-radius:8px; border:1px solid #eee; margin-bottom:10px; box-sizing:border-box; }
.stock-input-group { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; align-items:center; }
.stock-dir-select { padding:5px 8px; background:#fff; border:1px solid var(--primary); color:var(--primary); border-radius:6px; font-size:13px; font-weight:bold; outline:none; cursor:pointer; }
.picker-wrapper { display:inline-flex; align-items:center; gap:3px; font-size:13px; color:var(--text-muted); }
.picker-wrapper span.unit-txt { font-weight:600; color:var(--text-main); font-size:13px; }
.ios-picker { background:#f4f2f5; color:var(--text-main); border:1px solid #dcd6dd; border-radius:6px; padding:6px 6px; font-size:14px; font-weight:700; outline:none; cursor:pointer; -webkit-appearance:none; appearance:none; text-align:center; min-width:44px; }
.float-submit { position:fixed; right:20px; bottom:24px; z-index:99; background:var(--primary); color:#fff; border:none; padding:14px 26px; border-radius:50px; font-size:16px; font-weight:700; box-shadow:0 8px 16px rgba(74,21,75,.3); }
</style>
</head>
<body>
<div class="card"><div class="top-action-bar"><div class="back-btn" onclick="goBack()">返回</div></div><div id="list">正在加载...</div></div>
<button class="float-submit" onclick="submitStock()">💾 更新库存</button>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://wyjbnnqhiehjccmojbbg.supabase.co";
const SUPABASE_KEY="sb_publishable_WwTC7079N2e8ZQwPKUj-Gw_ewFiviFG";
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const currentEmployee={code:sessionStorage.getItem('current_employee_code'),name:sessionStorage.getItem('current_employee_name')};
if(!currentEmployee.code){alert('当前无登录员工，请重新选择员工！');location.href='index.html';}
let products=[],stockMap={},stockData={additions:{}};let currentSelectedBrand=null,currentSelectedSpec='';
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function makePureQtyOptionsHtml(max,current){let html='';for(let i=0;i<=max;i++)html+=`<option value="${i}" ${i===Number(current)?'selected':''}>${i}</option>`;return html;}
function formatQtyToUnits(totalPcs,p){let displayCases=Math.floor(totalPcs/p.pcs_per_case);let remPcs=totalPcs%p.pcs_per_case;if(p.pcs_per_box>0){let displayBoxes=Math.floor(remPcs/p.pcs_per_box);let displayPcs=remPcs%p.pcs_per_box;return `${displayCases}件 ${displayBoxes}盒 ${displayPcs}${p.unit}`;}return `${displayCases}件 ${remPcs}${p.unit}`;}
async function init(){const [pRes,sRes]=await Promise.all([client.from('products').select('*').eq('is_active',true),client.from('van_stocks').select('product_barcode,qty').eq('employee_code',currentEmployee.code)]);if(pRes.error){alert('加载商品失败：'+pRes.error.message);return;}products=(pRes.data||[]).map(x=>({...x,id:x.barcode,product_name:x.flavor||x.name,spec:(x.spec||'常规').trim(),unit:(x.unit||'个').trim(),pcs_per_box:Number(x.pcs_per_box||0),pcs_per_case:Number(x.pcs_per_case||24)}));(sRes.data||[]).forEach(st=>stockMap[st.product_barcode]=Number(st.qty||0));const brands=[...new Set(products.map(p=>p.brand).filter(Boolean))];currentSelectedBrand=brands[0]||null;const specs=[...new Set(products.filter(p=>p.brand===currentSelectedBrand).map(p=>p.spec).filter(Boolean))];currentSelectedSpec=specs[0]||'';renderStockPage();}
function generateFilterHeaderHtml(){const brands=[...new Set(products.map(p=>p.brand).filter(Boolean))];const specs=[...new Set(products.filter(p=>p.brand===currentSelectedBrand).map(p=>p.spec).filter(Boolean))];return `<div class='brand-nav'>${brands.map(b=>`<div class="brand-badge ${b===currentSelectedBrand?'active':''}" onclick="selectBrand('${esc(b)}')">${esc(b)}</div>`).join('')}</div><div class='spec-nav'>${specs.map(sp=>`<div class="spec-badge ${sp===currentSelectedSpec?'active':''}" onclick="selectSpec('${esc(sp)}')">${esc(sp)}</div>`).join('')}</div>`;}
function selectBrand(b){currentSelectedBrand=b;const specs=[...new Set(products.filter(p=>p.brand===b).map(p=>p.spec).filter(Boolean))];currentSelectedSpec=specs[0]||'';renderStockPage();}
function selectSpec(s){currentSelectedSpec=s;renderStockPage();}
function updateStockInput(id,type,val){if(!stockData.additions[id])stockData.additions[id]={dir:'plus',cases:0,boxes:0,pcs:0};if(type==='dir')stockData.additions[id].dir=val;else stockData.additions[id][type]=Number(val||0);}
function renderStockPage(){const displayProducts=products.filter(p=>p.brand===currentSelectedBrand&&p.spec===currentSelectedSpec);document.getElementById('list').innerHTML=`<div class='sub' style='font-weight:700;color:var(--primary);font-size:15px;'>🏢 车存配置：${esc(currentEmployee.name||currentEmployee.code)}</div>${generateFilterHeaderHtml()}${displayProducts.map(p=>{if(!stockData.additions[p.id])stockData.additions[p.id]={dir:'plus',cases:0,boxes:0,pcs:0};const ch=stockData.additions[p.id];const totalPcs=stockMap[p.id]||0;return `<div class="stock-row"><div style="font-weight:600;font-size:15px;color:var(--text-main);">${esc(p.product_name)}</div><div style="font-size:13px;margin-top:6px;color:#333;background:#f0ebf1;padding:6px 10px;border-radius:6px;">当前车存量: <strong>${formatQtyToUnits(totalPcs,p)}</strong> (${totalPcs}${esc(p.unit)})</div><div class="stock-input-group"><select class="stock-dir-select" onchange="updateStockInput('${esc(p.id)}','dir',this.value)"><option value="plus" ${ch.dir==='plus'?'selected':''}>➕ 增库</option><option value="minus" ${ch.dir==='minus'?'selected':''}>➖ 减库</option></select><div class="picker-wrapper"><select class="ios-picker" onchange="updateStockInput('${esc(p.id)}','cases',this.value)">${makePureQtyOptionsHtml(50,ch.cases)}</select><span class="unit-txt">箱</span></div>${p.pcs_per_box>0?`<div class="picker-wrapper"><select class="ios-picker" onchange="updateStockInput('${esc(p.id)}','boxes',this.value)">${makePureQtyOptionsHtml(50,ch.boxes)}</select><span class="unit-txt">盒</span></div>`:''}<div class="picker-wrapper"><select class="ios-picker" onchange="updateStockInput('${esc(p.id)}','pcs',this.value)">${makePureQtyOptionsHtml(100,ch.pcs)}</select><span class="unit-txt">${esc(p.unit)}</span></div></div></div>`}).join('')}`;}
async function submitStock(){const updates=[];for(const id of Object.keys(stockData.additions)){const p=products.find(x=>x.id===id);const ch=stockData.additions[id];if(!p)continue;const delta=ch.cases*p.pcs_per_case+ch.boxes*p.pcs_per_box+ch.pcs;if(delta>0){const newTotal=ch.dir==='plus'?(stockMap[id]||0)+delta:(stockMap[id]||0)-delta;if(newTotal<0){alert(`❌ [${p.product_name}] 车存可用数不足扣减！`);return;}updates.push({employee_code:currentEmployee.code,product_barcode:id,qty:newTotal});}}if(!updates.length){alert('请输入变更量！');return;}const {error}=await client.from('van_stocks').upsert(updates,{onConflict:'employee_code,product_barcode'});if(error){alert('保存失败：'+error.message);return;}location.reload();}
function goBack(){location.href='store.html';}
init();
</script>
</body>
</html>
