<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>库存导入</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
html,body{margin:0;width:100%;height:100%;background:#f4f2f5}iframe{display:block;width:100%;height:100vh;border:0;visibility:hidden;background:#f4f2f5}
</style>
</head>
<body>
<iframe id="page"></iframe>
<script>
const dealer=new URLSearchParams(location.search).get('dealer')==='ct'?'ct':'jn';
const cfg={
  jn:{name:'吉能库存导入',src:'stock_jn.html',fixed:'A单号、C制单日期、D客户编号、E客户、G条形码、H商品名称、I包装、J件、L散'},
  ct:{name:'长涛库存导入',src:'stock_'+dealer+'.html',fixed:'A制单日期、C商品名称、D包装、F件、G散、Q客户编号、R客户名称、X单号、AA条形码'}
}[dealer];
document.title=cfg.name;
const frame=document.getElementById('page');
frame.src=cfg.src;
frame.addEventListener('load',()=>{
  const d=frame.contentDocument;
  const style=d.createElement('style');
  style.textContent=`
    :root{--primary:#4A154B;--bg:#f4f2f5;--card:#fff;--text:#1f1121;--muted:#756676;--line:#e7e1e8;--danger:#dc2626}
    body{margin:0!important;padding:12px!important;background:var(--bg)!important;color:var(--text)!important;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif!important}
    .container{max-width:760px!important;margin:0 auto!important}
    .card{background:var(--card)!important;border:0!important;border-radius:14px!important;padding:14px!important;box-shadow:0 4px 14px rgba(74,21,75,.06)!important;margin-bottom:12px!important}
    h2{margin:0 0 10px!important;font-size:22px!important;color:var(--primary)!important;border:0!important;padding:0!important}
    .back{display:inline-block!important;margin:0 0 12px!important;border:1px solid var(--line)!important;background:#fff!important;color:var(--text)!important;border-radius:9px!important;padding:9px 12px!important;font-size:14px!important;font-weight:700!important;text-decoration:none!important}
    .sub{display:none!important}
    .map{border:1px solid var(--line)!important;border-radius:10px!important;background:#fbf9fc!important;padding:12px!important;font-size:13px!important;line-height:1.6!important;color:var(--text)!important;margin:0 0 12px!important}
    .upload{border:1px dashed var(--line)!important;background:#fff!important;border-radius:12px!important;color:var(--muted)!important}
    .upload:hover,.upload.dragover{border-color:var(--primary)!important;background:#fbf9fc!important}
    .btn{border-radius:9px!important;background:var(--primary)!important;color:#fff!important;border-color:var(--primary)!important;font-weight:700!important}
    .status{color:var(--primary)!important}
  `;
  d.head.appendChild(style);
  const back=d.querySelector('.back');
  if(back){back.textContent='返回管理后台';back.href='dashboard.html';back.onclick=e=>{e.preventDefault();parent.location.href='dashboard.html'}}
  const title=d.querySelector('h2');
  if(title)title.textContent=cfg.name;
  d.querySelectorAll('.sub').forEach(el=>el.remove());
  const map=d.querySelector('.map');
  if(map)map.innerHTML='<strong>固定列：</strong>'+cfg.fixed;
  frame.style.visibility='visible';
});
</script>
</body>
</html>
