<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>长涛库存导入</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>html,body{margin:0;width:100%;height:100%;background:#f4f2f5}iframe{display:block;width:100%;height:100vh;border:0;visibility:hidden;background:#f4f2f5}</style>
</head>
<body>
<iframe id="page" src="stock_ct.html"></iframe>
<script>
const frame=document.getElementById('page');
const fixed='A制单日期、C商品名称、D包装、F件、G散、Q客户编号、R客户名称、X单号、AA条形码';
frame.addEventListener('load',()=>{
 const d=frame.contentDocument;
 const s=d.createElement('style');
 s.textContent='body{margin:0!important;padding:12px!important;background:#f4f2f5!important;color:#1f1121!important;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif!important}.container{max-width:760px!important;margin:0 auto!important}.card{background:#fff!important;border:0!important;border-radius:14px!important;padding:14px!important;box-shadow:0 4px 14px rgba(74,21,75,.06)!important;margin-bottom:12px!important}h2{margin:0 0 10px!important;font-size:22px!important;color:#4A154B!important;border:0!important;padding:0!important}.back{display:inline-block!important;margin:0 0 12px!important;border:1px solid #e7e1e8!important;background:#fff!important;color:#1f1121!important;border-radius:9px!important;padding:9px 12px!important;font-size:14px!important;font-weight:700!important;text-decoration:none!important}.sub{display:none!important}.map{border:1px solid #e7e1e8!important;border-radius:10px!important;background:#fbf9fc!important;padding:12px!important;font-size:13px!important;line-height:1.6!important;color:#1f1121!important;margin:0 0 12px!important}.upload{border:1px dashed #e7e1e8!important;background:#fff!important;border-radius:12px!important;color:#756676!important}.upload:hover,.upload.dragover{border-color:#4A154B!important;background:#fbf9fc!important}.btn{border-radius:9px!important;background:#4A154B!important;color:#fff!important;border-color:#4A154B!important;font-weight:700!important}.status{color:#4A154B!important}';
 d.head.appendChild(s);
 const back=d.querySelector('.back');
 if(back){back.textContent='返回管理后台';back.href='dashboard.html';back.onclick=e=>{e.preventDefault();parent.location.href='dashboard.html'}}
 const title=d.querySelector('h2');if(title)title.textContent='长涛库存导入';
 d.querySelectorAll('.sub').forEach(el=>el.remove());
 const map=d.querySelector('.map');if(map)map.innerHTML='<strong>固定列：</strong>'+fixed;
 frame.style.visibility='visible';
});
</script>
</body>
</html>
