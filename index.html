<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8" /><title>系统入口 - 员工管理</title><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>:root {
  --primary: #4A154B;        
  --primary-hover: #360f37; 
  --accent: #ffb81c;        
  --bg-main: #f4f2f5;       
  --text-main: #1f1121;     
  --text-muted: #756676;    
  --card-bg: #ffffff;       
}body { 
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
  margin:0; background: var(--bg-main); color: var(--text-main); padding-bottom: 90px; 
  -webkit-tap-highlight-color: transparent;
  animation: pageFadeIn 0.2s ease-in-out; /* 平滑淡入 */
}@keyframes pageFadeIn {
  from { opacity: 0.6; } to { opacity: 1; }
}.header { background: var(--primary); color: #fff; padding:16px; position: sticky; top:0; z-index:100; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }.header-title { font-size: 18px; font-weight: 700; text-align: center; }.search-box { display: flex; gap: 8px; padding: 12px; background: #fff; border-bottom: 1px solid #e8e5e9; position: sticky; top: 55px; z-index: 99; }.search-box input { flex: 1; padding: 10px 12px; border: 1px solid #d1cbd2; border-radius: 8px; font-size: 14px; background: #fbfafb; outline: none; }.search-box input:focus { border-color: var(--primary); background: #fff; }.emp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 12px; }.emp-card { background: var(--card-bg); padding: 16px; border-radius: 12px; box-shadow: 0 4px 12px rgba(74,21,75,0.03); text-align: center; cursor: pointer; transition: transform 0.1s; }.emp-card:active { transform: scale(0.97); background: #fbfafb; }.sub { color: var(--text-muted); font-size: 12px; margin-top: 4px; }</style></head><body>

<div class="header">
  <div class="header-title">👥 员工选择系统</div>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="🔍 输入姓名或工号搜索员工..." oninput="renderEmployees()">
</div>

<div id="list">
  <div style="text-align:center; padding:40px; color:var(--text-muted);">正在加载员工数据...</div>
</div>

<script>
const SUPABASE_URL = "https://wyjbnnqhiehjccmojbbg.supabase.co";
const SUPABASE_KEY = "sb_publishable_WwTC7079N2e8ZQwPKUj-Gw_ewFiviFG";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let allEmployees = [];

async function init() {
  try {
    const { data, error } = await client.from('employees').select('employee_code, name').eq('is_active', true);
    if (error) throw error;
    allEmployees = (data || []).map(x => ({
      employee_code: String(x.employee_code).trim(),
      employee_name: (x.name || '未命名').trim()
    }));
    renderEmployees();
  } catch (err) {
    console.error("加载员工失败:", err);
    document.getElementById('list').innerHTML = `<div style="text-align:center;padding:40px;color:red;">❌ 数据加载失败，请刷新重试</div>`;
  }
}

function renderEmployees() {
  const keyword = document.getElementById('search').value.trim().toLowerCase();
  const listEl = document.getElementById('list');
  
  const filtered = allEmployees.filter(e => 
    e.employee_name.toLowerCase().includes(keyword) || e.employee_code.toLowerCase().includes(keyword)
  );

  if (filtered.length === 0) {
    listEl.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted);">⚠️ 未找到匹配的员工</div>`;
    return;
  }

  listEl.innerHTML = `
    <div class="emp-grid">
      ${filtered.map(e => `
        <div class="emp-card" onclick="selectEmployee('${e.employee_code}', '${e.employee_name}')">
          <strong style="font-size:16px; color:var(--primary); display:block;">${e.employee_name}</strong>
          <div class="sub">${e.employee_code}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function selectEmployee(code, name) {
  // 使用 sessionStorage 在页面间高稳定性传递轻量状态数据
  sessionStorage.setItem('current_employee_code', code);
  sessionStorage.setItem('current_employee_name', name);
  // 跳转到独立的门店页面
  window.location.href = 'store.html';
}

init();
</script>
</body></html>
