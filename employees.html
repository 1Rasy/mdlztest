<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>员工表管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <style>
    :root { --primary:#4A154B; --bg:#f4f2f5; --card:#fff; --text:#1f1121; --muted:#756676; --line:#e7e1e8; --ok:#16a34a; --danger:#dc2626; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); padding:12px; -webkit-tap-highlight-color:transparent; }
    .card { background:var(--card); border-radius:14px; padding:14px; box-shadow:0 4px 14px rgba(74,21,75,.06); }
    .top { display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap; margin-bottom:12px; }
    h1 { margin:0; font-size:21px; color:var(--primary); }
    .btn { border:1px solid var(--line); background:#fff; color:var(--text); border-radius:9px; padding:9px 12px; font-weight:700; cursor:pointer; }
    .btn.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
    .btn:disabled { opacity:.55; cursor:not-allowed; }
    .toolbar { display:grid; grid-template-columns:1fr auto; gap:8px; margin:12px 0; align-items:center; }
    .search { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:9px; font-size:15px; outline:none; }
    .status { font-size:13px; color:var(--muted); margin:8px 0; }
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:12px; max-height:calc(100vh - 170px); background:#fff; }
    table { width:100%; min-width:980px; table-layout:fixed; border-collapse:separate; border-spacing:0; }
    th, td { border-bottom:1px solid var(--line); border-right:1px solid var(--line); padding:8px; vertical-align:middle; font-size:13px; white-space:normal; word-break:break-word; }
    th { position:sticky; top:0; z-index:2; background:#fbf9fc; color:var(--primary); text-align:left; font-weight:800; }
    th:nth-child(1), td:nth-child(1) { width:170px; }
    th:nth-child(2), td:nth-child(2) { width:210px; }
    th:nth-child(3), td:nth-child(3) { width:300px; }
    th:nth-child(4), td:nth-child(4) { width:160px; }
    th:nth-child(5), td:nth-child(5) { width:90px; text-align:center; }
    td input[type="text"] { width:100%; min-width:0; padding:8px; border:1px solid transparent; border-radius:7px; font-size:13px; background:#fafafa; }
    td input[type="text"]:focus { outline:none; border-color:var(--primary); background:#fff; }
    textarea.customer-codes { width:100%; min-height:58px; resize:vertical; padding:8px; border:1px solid transparent; border-radius:7px; font-size:13px; line-height:1.45; background:#fafafa; font-family:inherit; }
    textarea.customer-codes:focus { outline:none; border-color:var(--primary); background:#fff; }
    .dirty { background:#fff7ed !important; border-color:#fdba74 !important; }
    .error { color:var(--danger); font-weight:700; }
    .ok { color:var(--ok); font-weight:700; }
    .new-row td { background:#fffbeb; }
    .new-row input { border-color:#facc15 !important; background:#fff !important; }
    .inline-actions { display:flex; gap:5px; flex-wrap:wrap; margin-top:6px; }
    .inline-actions .btn { padding:5px 7px; border-radius:7px; font-size:12px; }
    @media (max-width:700px){ body{padding:8px;} .toolbar{grid-template-columns:1fr;} .table-wrap{max-height:calc(100vh - 220px);} }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <h1>员工表管理</h1>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn" onclick="location.href='index.html'">← 返回首页</button>
        <button class="btn" onclick="loadEmployees()">刷新</button>
        <button id="addEmployeeBtn" class="btn" onclick="openInlineEmployeeRow()">添加员工</button>
        <button class="btn primary" onclick="saveAllDirty()">保存修改</button>
      </div>
    </div>

    <div class="toolbar">
      <input id="globalSearch" class="search" placeholder="搜索：工号 / 姓名" oninput="applyFilters()">
      <button class="btn" onclick="clearSearch()">清空搜索</button>
    </div>

    <div id="status" class="status">正在加载员工...</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="employee-code-col">员工工号</th>
            <th class="employee-name-col">员工姓名</th>
            <th class="customer-code-col">经销商客户编号</th>
            <th class="action-col">操作</th>
            <th class="active-col">启用</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://wyjbnnqhiehjccmojbbg.supabase.co";
const SUPABASE_KEY = "sb_publishable_WwTC7079N2e8ZQwPKUj-Gw_ewFiviFG";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let employees = [];
let mappings = [];
let filtered = [];
let showInlineNewEmployee = false;
let creatingEmployee = false;
const dirtyMap = new Map();
const editableFields = ['employee_code','name','is_active'];

function setStatus(msg, cls='') {
  const el = document.getElementById('status');
  el.className = 'status ' + cls;
  el.textContent = msg;
}
function esc(v) { return String(v ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function getTrimmed(id) { return document.getElementById(id).value.trim(); }
function parseCustomerCodes(value) {
  const seen = new Set();
  return String(value || '')
    .split(/[\s,，;；]+/)
    .map(x => x.trim())
    .filter(Boolean)
    .filter(code => {
      if (seen.has(code)) return false;
      seen.add(code);
      return true;
    });
}
function formatCustomerCodes(codes) {
  return (codes || []).filter(Boolean).join('\n');
}
function getEmployeeCustomerCodes(employeeCode) {
  return mappings
    .filter(row => String(row.employee_code || '') === String(employeeCode || ''))
    .map(row => String(row.customer_code || '').trim())
    .filter(Boolean)
    .sort((a, b) => a.localeCompare(b, 'zh-Hans-CN', { numeric:true }));
}
function isDuplicateEmployeeError(error) {
  const text = [error && error.message, error && error.details, error && error.hint, error && error.code].filter(Boolean).join(' ');
  return text.includes('employees_employee_code_key') || text.includes('duplicate key value') || text.includes('23505');
}

async function loadEmployees() {
  setStatus('正在加载员工...');
  dirtyMap.clear();
  showInlineNewEmployee = false;
  updateAddEmployeeButton();
  const [employeeRes, mappingRes] = await Promise.all([
    client
      .from('employees')
      .select('id, employee_code, name, is_active, created_at')
      .order('employee_code', { ascending:true }),
    client
      .from('dealer_employee_mappings')
      .select('id, customer_code, customer_name, employee_code')
      .order('customer_code', { ascending:true })
  ]);
  if (employeeRes.error) {
    console.error(employeeRes.error);
    setStatus('加载失败：' + employeeRes.error.message, 'error');
    return;
  }
  if (mappingRes.error) {
    console.error(mappingRes.error);
    setStatus('加载经销商客户编号失败：' + mappingRes.error.message, 'error');
    return;
  }
  mappings = (mappingRes.data || []).map(row => ({
    ...row,
    customer_code: String(row.customer_code || '').trim(),
    employee_code: String(row.employee_code || '').trim()
  }));
  employees = (employeeRes.data || []).map(e => ({
    ...e,
    original_employee_code: e.employee_code,
    is_active: e.is_active !== false,
    customer_codes: getEmployeeCustomerCodes(e.employee_code),
    customer_codes_text: formatCustomerCodes(getEmployeeCustomerCodes(e.employee_code))
  }));
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('globalSearch').value.trim().toLowerCase();
  filtered = employees.filter(e => {
    const blob = [e.employee_code, e.name, e.customer_codes_text].map(x => String(x || '').toLowerCase()).join(' ');
    return !q || blob.includes(q);
  });
  renderTable();
}
function clearSearch() {
  document.getElementById('globalSearch').value = '';
  applyFilters();
}
function markDirty(id, field, value) {
  const original = employees.find(e => String(e.id) === String(id));
  if (!original) return;
  let normalized = value;
  if (field === 'is_active') normalized = !!value;
  if (field === 'customer_codes') {
    const codes = parseCustomerCodes(value);
    original.customer_codes = codes;
    original.customer_codes_text = formatCustomerCodes(codes);
    normalized = codes;
  }
  original[field] = normalized;
  if (!dirtyMap.has(String(id))) dirtyMap.set(String(id), {});
  dirtyMap.get(String(id))[field] = normalized;
  const el = document.querySelector(`[data-id="${CSS.escape(String(id))}"][data-field="${field}"]`);
  if (el) el.classList.add('dirty');
  setStatus(`已修改 ${dirtyMap.size} 条，记得保存。`);
}
function renderInput(e, field) {
  const val = e[field] ?? '';
  return `<input data-id="${esc(e.id)}" data-field="${field}" type="text" value="${esc(val)}" onchange="markDirty('${esc(e.id)}','${field}',this.value)">`;
}
function renderCustomerCodesInput(e) {
  const val = e.customer_codes_text ?? formatCustomerCodes(e.customer_codes);
  return `<textarea class="customer-codes" data-id="${esc(e.id)}" data-field="customer_codes" placeholder="一行一个，或用逗号分隔" onchange="markDirty('${esc(e.id)}','customer_codes',this.value)">${esc(val)}</textarea>`;
}
function renderNewEmployeeRow() {
  if (!showInlineNewEmployee) return '';
  return `
    <tr class="new-row">
      <td><input id="new_employee_code" type="text" autocomplete="off" placeholder="必填"></td>
      <td><input id="new_name" type="text" autocomplete="off" placeholder="必填"></td>
      <td><textarea id="new_customer_codes" class="customer-codes" autocomplete="off" placeholder="经销商客户编号"></textarea></td>
      <td>
        <div class="inline-actions">
          <button id="createEmployeeBtn" class="btn primary" onclick="createEmployee()">提交</button>
          <button class="btn" onclick="cancelInlineEmployeeRow()">取消</button>
        </div>
      </td>
      <td><input id="new_is_active" type="checkbox" checked></td>
    </tr>
  `;
}
function renderTable() {
  const rows = filtered.map(e => `
    <tr>
      <td>${renderInput(e,'employee_code')}</td>
      <td>${renderInput(e,'name')}</td>
      <td>${renderCustomerCodesInput(e)}</td>
      <td><button class="btn" onclick="saveRow('${esc(e.id)}')">保存本行</button></td>
      <td><input data-id="${esc(e.id)}" data-field="is_active" type="checkbox" ${e.is_active ? 'checked' : ''} onchange="markDirty('${esc(e.id)}','is_active',this.checked)"></td>
    </tr>
  `).join('');
  document.getElementById('tbody').innerHTML = renderNewEmployeeRow() + rows;
  updateAddEmployeeButton();
  setStatus(`共 ${employees.length} 条，当前显示 ${filtered.length} 条。未保存修改 ${dirtyMap.size} 条。`);
}
function updateAddEmployeeButton() {
  const btn = document.getElementById('addEmployeeBtn');
  if (!btn) return;
  btn.disabled = showInlineNewEmployee || creatingEmployee;
  btn.textContent = showInlineNewEmployee ? '正在添加' : '添加员工';
}
function openInlineEmployeeRow() {
  if (showInlineNewEmployee) {
    const input = document.getElementById('new_employee_code');
    if (input) input.focus();
    return;
  }
  showInlineNewEmployee = true;
  renderTable();
  setStatus('请在列表最上方填写新员工，员工工号和姓名必填。');
  setTimeout(() => {
    const wrap = document.querySelector('.table-wrap');
    if (wrap) wrap.scrollTop = 0;
    const input = document.getElementById('new_employee_code');
    if (input) input.focus();
  }, 0);
}
function cancelInlineEmployeeRow() {
  if (creatingEmployee) return;
  showInlineNewEmployee = false;
  renderTable();
}
async function createEmployee() {
  const btn = document.getElementById('createEmployeeBtn');
  const customerCodes = parseCustomerCodes(document.getElementById('new_customer_codes').value);
  const payload = {
    employee_code: getTrimmed('new_employee_code'),
    name: getTrimmed('new_name'),
    is_active: document.getElementById('new_is_active').checked
  };
  if (!payload.employee_code || !payload.name) {
    setStatus('新增失败：员工工号和姓名不能为空。', 'error');
    return;
  }
  creatingEmployee = true;
  updateAddEmployeeButton();
  if (btn) { btn.disabled = true; btn.textContent = '提交中'; }
  const { data, error } = await client
    .from('employees')
    .insert(payload)
    .select('id, employee_code, name, is_active, created_at')
    .single();
  creatingEmployee = false;
  if (error) {
    console.error(error);
    if (btn) { btn.disabled = false; btn.textContent = '提交'; }
    updateAddEmployeeButton();
    if (isDuplicateEmployeeError(error)) {
      setStatus(`新增失败：员工工号「${payload.employee_code}」已存在。`, 'error');
    } else {
      setStatus('新增失败：' + error.message, 'error');
    }
    return;
  }
  if (customerCodes.length) {
    const mappingOk = await saveMappingsForEmployee(payload.employee_code, '', customerCodes);
    if (!mappingOk) {
      if (btn) { btn.disabled = false; btn.textContent = '提交'; }
      updateAddEmployeeButton();
      return;
    }
  }
  employees.push({
    ...data,
    original_employee_code: data.employee_code,
    is_active: data.is_active !== false,
    customer_codes: customerCodes,
    customer_codes_text: formatCustomerCodes(customerCodes)
  });
  employees.sort((a,b) => String(a.employee_code || '').localeCompare(String(b.employee_code || ''), 'zh-Hans-CN', { numeric:true }));
  showInlineNewEmployee = false;
  setStatus('已添加：' + (data.name || data.employee_code), 'ok');
  applyFilters();
}
async function saveMappingsForEmployee(nextEmployeeCode, previousEmployeeCode, nextCustomerCodes) {
  const nextCode = String(nextEmployeeCode || '').trim();
  const previousCode = String(previousEmployeeCode || '').trim();
  const wanted = new Set(parseCustomerCodes(nextCustomerCodes.join('\n')));
  const ownedBefore = mappings
    .filter(row => {
      const mappedCode = String(row.employee_code || '').trim();
      return mappedCode === nextCode || (previousCode && mappedCode === previousCode);
    })
    .map(row => String(row.customer_code || '').trim())
    .filter(Boolean);
  const toUnassign = ownedBefore.filter(code => !wanted.has(code));
  const toAssign = Array.from(wanted).map(customer_code => ({ customer_code, employee_code: nextCode }));
  if (toAssign.length) {
    const { error } = await client
      .from('dealer_employee_mappings')
      .upsert(toAssign, { onConflict: 'customer_code' });
    if (error) {
      console.error(error);
      setStatus('保存经销商客户编号失败：' + error.message, 'error');
      return false;
    }
  }

  for (const code of toUnassign) {
    const { error } = await client
      .from('dealer_employee_mappings')
      .update({ employee_code: null })
      .eq('customer_code', code);
    if (error) {
      console.error(error);
      setStatus('保存经销商客户编号失败：' + error.message, 'error');
      return false;
    }
  }

  mappings = mappings.map(row => {
    const customerCode = String(row.customer_code || '').trim();
    if (wanted.has(customerCode)) return { ...row, employee_code: nextCode };
    if (toUnassign.includes(customerCode)) return { ...row, employee_code: '' };
    if (previousCode && String(row.employee_code || '').trim() === previousCode) return { ...row, employee_code: nextCode };
    return row;
  });
  toAssign.forEach(row => {
    if (!mappings.some(existing => String(existing.customer_code || '').trim() === row.customer_code)) {
      mappings.push({ id: null, customer_code: row.customer_code, customer_name: '', employee_code: nextCode });
    }
  });
  return true;
}
async function saveRow(id) {
  const patch = dirtyMap.get(String(id));
  if (!patch) { setStatus('本行没有需要保存的修改。'); return true; }
  const cleanPatch = {};
  editableFields.forEach(k => { if (Object.prototype.hasOwnProperty.call(patch, k)) cleanPatch[k] = patch[k]; });
  if (Object.prototype.hasOwnProperty.call(cleanPatch, 'employee_code') && String(cleanPatch.employee_code || '').trim() === '') {
    setStatus('保存失败：员工工号不能为空。', 'error');
    return false;
  }
  if (Object.prototype.hasOwnProperty.call(cleanPatch, 'name') && String(cleanPatch.name || '').trim() === '') {
    setStatus('保存失败：员工姓名不能为空。', 'error');
    return false;
  }
  const employee = employees.find(e => String(e.id) === String(id));
  const previousEmployeeCode = employee ? String(employee.original_employee_code || employee.employee_code || '').trim() : '';
  const nextEmployeeCode = String(cleanPatch.employee_code || employee?.employee_code || '').trim();
  const nextCustomerCodes = Object.prototype.hasOwnProperty.call(patch, 'customer_codes')
    ? patch.customer_codes
    : parseCustomerCodes(employee?.customer_codes_text || '');

  const { data, error } = await client
    .from('employees')
    .update(cleanPatch)
    .eq('id', id)
    .select('id, employee_code, name, is_active, created_at')
    .single();
  if (error) {
    console.error(error);
    if (isDuplicateEmployeeError(error)) {
      setStatus('保存失败：员工工号已存在，不能改成重复工号。', 'error');
    } else {
      setStatus('保存失败：' + error.message, 'error');
    }
    return false;
  }
  const idx = employees.findIndex(e => String(e.id) === String(id));
  const mappingsOk = await saveMappingsForEmployee(nextEmployeeCode, previousEmployeeCode, nextCustomerCodes);
  if (!mappingsOk) return false;

  if (idx >= 0) {
    const customerCodes = getEmployeeCustomerCodes(data.employee_code);
    employees[idx] = {
      ...employees[idx],
      ...data,
      original_employee_code: data.employee_code,
      is_active: data.is_active !== false,
      customer_codes: customerCodes,
      customer_codes_text: formatCustomerCodes(customerCodes)
    };
  }
  dirtyMap.delete(String(id));
  setStatus('已保存：' + (data.name || data.employee_code), 'ok');
  applyFilters();
  return true;
}
async function saveAllDirty() {
  const ids = Array.from(dirtyMap.keys());
  if (ids.length === 0) { setStatus('没有需要保存的修改。'); return; }
  setStatus(`正在保存 ${ids.length} 条...`);
  for (const id of ids) {
    const ok = await saveRow(id);
    if (!ok) break;
  }
  if (dirtyMap.size === 0) setStatus('全部修改已保存。', 'ok');
  else setStatus(`部分保存失败，剩余 ${dirtyMap.size} 条未保存。`, 'error');
}

loadEmployees();
</script>
</body>
</html>
