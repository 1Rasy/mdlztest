async function deleteExistingOrder(orderNo,rawItemsEncoded){if(!confirm('确定删除本笔记录并返还库存量吗？'))return;document.getElementById('list').innerHTML=loadingHtml();try{const items=JSON.parse(decodeURIComponent(rawItemsEncoded)),ret={};items.forEach(it=>ret[it.barcode]=(ret[it.barcode]||0)+Number(it.qty||0));const{data}=await client.from('van_stocks').select('*').eq('employee_code',currentEmployee.code),live={};(data||[]).forEach(st=>live[st.product_barcode]=Number(st.qty)||0);const updates=Object.keys(ret).map(bc=>({employee_code:currentEmployee.code,product_barcode:bc,qty:Number(live[bc]||0)+Number(ret[bc]||0)}));await client.from('sales_order_items').delete().eq('order_no',orderNo);await client.from('sales_orders').delete().eq('order_no',orderNo);if(updates.length)await client.from('van_stocks').upsert(updates,{onConflict:'employee_code,product_barcode'});document.getElementById('list').getAttribute('data-from-report')==='true'?openSaleReport(selectedReportDate):openStoreHistory(currentStore.atom,currentStore.name)}catch(err){console.error(err);alert('❌ 删除失败，请重试');openStoreHistory(currentStore.atom,currentStore.name)}}
async function openSaleReport(preset='today'){STATE='REPORT';orderData=null;document.getElementById('alphabetSidebar').classList.add('hide');document.getElementById('searchBlock').classList.add('hide');selectedReportDate=preset||'today';const range=getReportRange(selectedReportDate);renderReportLoading(selectedReportDate);try{let query=client.from('sales_orders').select('*').eq('employee_code',currentEmployee.code).order('created_at',{ascending:false});if(range.start)query=query.gte('created_at',`${range.start}T00:00:00`).lte('created_at',`${range.end}T23:59:59`);const{data:orders}=await query;if(!orders?.length){renderReportHtml(selectedReportDate,0,[]);return}const nos=orders.map(o=>o.order_no),{data:items}=await client.from('sales_order_items').select('*').in('order_no',nos);let total=0;const map={};orders.forEach(o=>{const d=o.created_at?o.created_at.split('T')[0]:'未知';map[o.order_no]={orderNo:o.order_no,orderDate:d,atomCode:o.atom_code,storeName:o.store_name||`未知门店(${o.atom_code})`,netRevenue:0,skuCount:0}});(items||[]).forEach(it=>{total+=Number(it.amount||0);if(map[it.order_no]){map[it.order_no].netRevenue+=Number(it.amount||0);map[it.order_no].skuCount+=1}});renderReportHtml(selectedReportDate,total,Object.values(map))}catch(e){document.getElementById('reportRows')?.insertAdjacentHTML('afterbegin',`<div style="color:red;padding:20px;">❌ 加载数据失败: ${e.message}</div>`)}}function renderReportHtml(preset,netSum,rows){const range=getReportRange(preset);document.getElementById('list').innerHTML=`<div class="big-store-title">📈 卖进数据</div>${reportFilterHtml(preset)}<div id="reportSummary" class="amount-summary-banner"><span>💵 <strong>${range.label}总实收：${money(netSum)} 元</strong></span></div><div id="reportRows">${rows.length===0?`<div class="sub" style="text-align:center;padding:40px;color:#aaa;">⚠️ 暂无报表记录</div>`:rows.map(r=>`<div class="history-item" style="cursor:pointer;border-left:4px solid var(--primary);padding:14px;margin-bottom:10px;" onclick="triggerReportDetailView('${esc(r.atomCode)}','${esc(r.storeName)}','${esc(r.orderNo)}','${esc(r.orderDate)}')"><div style="width:100%;display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:15px;color:var(--primary);">${esc(r.storeName)}</strong><span style="color:var(--text-muted);font-size:12px;background:#f4f2f5;padding:2px 6px;border-radius:4px;">${r.orderDate}</span></div><div style="font-size:12px;color:var(--text-muted);margin-top:6px;display:flex;justify-content:space-between;width:100%;"><span>品项: <strong>${r.skuCount}</strong> 种</span><span style="color:#2b1d2c;font-weight:700;font-size:13px;">💵 实收：${money(r.netRevenue)} 元</span></div></div>`).join('')}</div>`}function triggerReportDetailView(atomCode,storeName,orderNo,orderDate){currentStore={atom:atomCode,name:storeName};viewOrderDetail(orderNo,orderDate,true)}
function editExistingOrder(orderNo,orderDate,rawItemsEncoded){isNewStoreFlow=false;templateEditOrNew(orderNo,orderDate,rawItemsEncoded)}function openOrder(atom,name){isNewStoreFlow=String(atom).startsWith('NEW_');templateEditOrNew(null,null,null,atom,name)}function initOrderItems(){products.forEach(p=>{orderData.items[p.id]=defaultItem(p)})}function templateEditOrNew(orderNo=null,orderDate=null,rawItemsEncoded=null,atom=null,name=null){STATE='ORDER';if(orderNo){const items=JSON.parse(decodeURIComponent(rawItemsEncoded));orderData={order_no:orderNo,atom:currentStore.atom,name:currentStore.name,date:orderDate,items:{},oldDbItemsMap:{}};initOrderItems();items.forEach(it=>{const p=products.find(x=>x.id==it.barcode);if(!p)return;const item=orderData.items[it.barcode],su=String(it.sale_unit||''),hasSale=it.sale_qty!=null;if(hasSale){if(su==='整'){item.wholeQty+=Number(it.sale_qty||0);item.wholePrice=Number(it.sale_unit_price??it.unit_price??item.wholePrice)}else{item.looseQty+=Number(it.sale_qty||0);item.loosePrice=Number(it.sale_unit_price??it.unit_price??item.loosePrice)}}else{const sp=splitQtyForEditor(Number(it.qty||0),p);item.wholeQty+=sp.wholeQty;item.looseQty+=sp.looseQty;item.wholePrice=Number(it.unit_price||0)*packSize(p);item.loosePrice=Number(it.unit_price||0)}orderData.oldDbItemsMap[it.barcode]=(orderData.oldDbItemsMap[it.barcode]||0)+Number(it.qty||0)})}else{const d=new Date(),today=dateOnly(d);orderData={atom,name,date:today,items:{},oldDbItemsMap:{}};initOrderItems()}if(products.length){const brands=orderedUnique(products,'brand');currentSelectedBrand=brands[0]||null;currentSelectedSpec=getSpecsForBrand(currentSelectedBrand)[0]||''}renderOrder()}
function calculateLiveOrderAmounts(){let s=0,count=0;products.forEach(p=>{const it=orderData.items[p.id];if(it){if(stockQtyFromItem(p,it)>0)count++;s+=amountFromItem(it)}});document.getElementById('liveAmountBanner').innerHTML=`<span style="font-size:15px;color:var(--primary);">💵 <strong>实时预估实收：${money(s)} 元</strong></span><br>选购品项：${count} 款`}function renderOrder(){STATE='ORDER';const list=orderedProducts(products.filter(p=>p.brand===currentSelectedBrand&&p.spec===currentSelectedSpec));const isTemp=String(orderData.atom).startsWith('NEW_');document.getElementById('list').innerHTML=`<div class="big-store-title">${esc(orderData.name)} ${isTemp?'<span style="font-size:12px;background:#fff1f0;color:#ff4d4f;padding:2px 8px;border-radius:12px;vertical-align:middle;">新门店开单</span>':''}</div><div style='margin-bottom:8px;'>📅 日期：<span id='dateText'>${orderData.date}</span><div class="date-picker-wrapper"><button class='smallbtn'>修改日期</button><input type="date" class="real-date-input" value="${orderData.date}" onchange="syncSelectedDate(this.value)"></div></div><div id="liveAmountBanner" class="amount-summary-banner"></div>${generateFilterHeaderHtml()}${list.map(p=>{const it=orderData.items[p.id]||defaultItem(p);orderData.items[p.id]=it;return `<div class='item'><div class='prod-info'><div class='prod-name'>${esc(p.product_name)}</div><div class='sub'>整=扣 ${packSize(p)}${unitOf(p)}；散=扣 1${unitOf(p)}</div></div><div class='control-group'><div class='sell-line'><span class='sell-tag' style='background:#756676;'>散</span><select class="ios-picker" onchange="changeQty('${esc(p.id)}','looseQty',this.value)">${makeQtyOptions(100,it.looseQty)}</select><span class="sell-unit">${unitOf(p)}</span><span class="price-label">价格</span><select class="ios-picker price-picker" onchange="changePrice('${esc(p.id)}','loosePrice',this.value)">${makePriceOptions(p.default_price,it.loosePrice)}</select><span class="unit-txt">元</span></div><div class='sell-line'><span class='sell-tag'>整</span><select class="ios-picker" onchange="changeQty('${esc(p.id)}','wholeQty',this.value)">${makeQtyOptions(50,it.wholeQty)}</select><span class="sell-unit">整</span><span class="price-label">价格</span><select class="ios-picker price-picker" onchange="changePrice('${esc(p.id)}','wholePrice',this.value)">${makePriceOptions(wholeDefaultPrice(p),it.wholePrice)}</select><span class="unit-txt">元</span></div></div></div>`}).join('')}<button class='float-submit' onclick='submitOrder()'>🚀 提交账单</button>`;calculateLiveOrderAmounts()}function changeQty(id,key,value){orderData.items[id][key]=parseInt(value)||0;calculateLiveOrderAmounts()}function changePrice(id,key,value){orderData.items[id][key]=Number(value)||0;calculateLiveOrderAmounts()}function syncSelectedDate(val){if(!val)return;orderData.date=val;document.getElementById('dateText').innerText=val}
async function submitOrder(){let grand=0;Object.keys(orderData.items).forEach(id=>{const p=products.find(x=>x.id==id);if(p)grand+=stockQtyFromItem(p,orderData.items[id])});if(grand===0){alert('⚠️ 空白单据无法提交！');return}const btn=document.querySelector('.float-submit');if(btn){btn.disabled=true;btn.innerText=LOADING_TEXT}try{let finalOrderNo=orderData.order_no;if(isNewStoreFlow&&!finalOrderNo){await client.from('employee_store_assets').insert({employee_code:String(currentEmployee.code),atom_code:String(orderData.atom),store_name:String(orderData.name)});stores.push({atom_code:orderData.atom,store_name:orderData.name});stores.sort((a,b)=>a.store_name.localeCompare(b.store_name,'zh-CN'));isNewStoreFlow=false}const{data:currentStocks}=await client.from('van_stocks').select('*').eq('employee_code',currentEmployee.code),live={};(currentStocks||[]).forEach(st=>live[st.product_barcode]=Number(st.qty)||0);const stockUpdates=[],itemsPayload=[];let total=0;for(const id of Object.keys(orderData.items)){const p=products.find(x=>x.id==id);if(!p)continue;const it=orderData.items[id],stockQty=stockQtyFromItem(p,it),oldDb=Number(orderData.oldDbItemsMap?.[id]||0),delta=stockQty-oldDb;if(delta!==0||stockQty>0)stockUpdates.push({product_barcode:String(id),qty:Number(live[id]||0)-delta});if(Number(it.wholeQty||0)>0){const qty=Number(it.wholeQty),price=Number(it.wholePrice||0),amount=qty*price;total+=amount;itemsPayload.push({barcode:String(id),product_name:String(p.product_name),qty:Number(qty*packSize(p)),unit_price:price,amount:Number(amount.toFixed(2)),sale_unit:'整',sale_qty:qty,sale_unit_price:price})}if(Number(it.looseQty||0)>0){const qty=Number(it.looseQty),price=Number(it.loosePrice||0),amount=qty*price;total+=amount;itemsPayload.push({barcode:String(id),product_name:String(p.product_name),qty:Number(qty),unit_price:price,amount:Number(amount.toFixed(2)),sale_unit:'散',sale_qty:qty,sale_unit_price:price})}}if(!finalOrderNo)finalOrderNo='SO'+Date.now()+Math.floor(Math.random()*1000);const{error}=await client.rpc('submit_sales_order_v2',{p_order_no:String(finalOrderNo),p_employee_code:String(currentEmployee.code),p_atom_code:String(orderData.atom),p_store_name:String(orderData.name),p_total_amount:Number(total.toFixed(2)),p_items:itemsPayload,p_stock_updates:stockUpdates});if(error)throw new Error(error.message);alert('✅ 开单成功');orderData=null;openStoreHistory(currentStore.atom,currentStore.name)}catch(err){console.error(err);alert(`❌ 账单保存失败: ${err.message||'网络错误'}`);if(btn){btn.disabled=false;btn.innerText='🚀 提交账单'}}}
function goBack(){if(STATE==='STORE'){sessionStorage.clear();location.href='index.html'}else if(STATE==='STOCK'||STATE==='REPORT'||STATE==='NEW_STORE_MGT'){orderData=null;selectedReportDate='today';renderStores()}else if(STATE==='DETAIL'){document.getElementById('list').getAttribute('data-from-report')==='true'?openSaleReport(selectedReportDate):renderHistory()}else if(STATE==='ORDER'){if(orderData?.order_no){const no=orderData.order_no,d=orderData.date,from=document.getElementById('list').getAttribute('data-from-report')==='true';orderData=null;viewOrderDetail(no,d,from)}else{const isTemp=String(orderData?.atom).startsWith('NEW_');orderData=null;if(isTemp)openNewStoreManagement();else renderHistory()}}else if(STATE==='HISTORY'){const isTemp=String(currentStore?.atom).startsWith('NEW_');orderData=null;if(isTemp)openNewStoreManagement();else renderStores()}}
init();
