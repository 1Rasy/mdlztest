<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>经销商库存导入</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    :root { --primary:#4A154B; --bg-main:#f8f9fa; --text-main:#212529; --card-bg:#ffffff; --border-color:#dee2e6; --blue:#0050b3; }
    * { box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; margin:0; padding:40px 20px; background:var(--bg-main); color:var(--text-main); }
    .container { max-width:640px; margin:40px auto; }
    .card { background:var(--card-bg); padding:32px; border-radius:12px; border:1px solid var(--border-color); box-shadow:0 4px 12px rgba(0,0,0,.03); }
    h2 { margin:0 0 10px; color:var(--text-main); font-size:20px; font-weight:800; border-bottom:2px solid var(--primary); padding-bottom:10px; }
    .sub { margin:0 0 22px; color:#6c757d; font-size:13px; line-height:1.65; }
    .dealer-grid { display:grid; grid-template-columns:1fr; gap:14px; }
    .dealer-btn { display:block; text-decoration:none; color:#fff; background:linear-gradient(135deg,var(--primary),#6b266c); padding:18px 20px; border-radius:10px; font-size:17px; font-weight:800; text-align:center; box-shadow:0 6px 14px rgba(74,21,75,.16); }
    .dealer-btn small { display:block; margin-top:6px; font-size:12px; font-weight:500; opacity:.88; }
    .dealer-btn.secondary { background:linear-gradient(135deg,#1890ff,var(--blue)); }
    .back-link { display:inline-block; margin-bottom:14px; color:var(--primary); font-size:13px; font-weight:700; text-decoration:none; }
  </style>
</head>
<body>
<div class="container">
  <a class="back-link" href="store.html">← 返回管理后台</a>
  <div class="card">
    <h2>经销商库存导入</h2>
    <p class="sub">请选择经销商。吉能和长涛 Excel 格式不同，会进入不同导入页，但最终都写入 raw_dealer_outbounds，并由数据库触发器同步库存。</p>
    <div class="dealer-grid">
      <a class="dealer-btn" href="stock_jn.html">吉能导入 <small>沿用原 stock_import 固定列规则</small></a>
      <a class="dealer-btn secondary" href="stock_ct.html">长涛导入 <small>A日期 / X单号 / AA条码等固定列规则</small></a>
    </div>
  </div>
</div>
</body>
</html>
