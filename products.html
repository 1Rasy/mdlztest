<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>商品表管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <style>
    :root { --primary:#4A154B; --bg:#f4f2f5; --card:#fff; --text:#1f1121; --muted:#756676; --line:#e7e1e8; --ok:#16a34a; --danger:#dc2626; --warn:#f59e0b; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); padding:12px; -webkit-tap-highlight-color:transparent; }
    .card { background:var(--card); border-radius:14px; padding:14px; box-shadow:0 4px 14px rgba(74,21,75,.06); }
    .top { display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap; margin-bottom:12px; }
    h1 { margin:0; font-size:21px; color:var(--primary); }
    .btn { border:1px solid var(--line); background:#fff; color:var(--text); border-radius:9px; padding:9px 12px; font-weight:700; cursor:pointer; }
    .btn.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
    .btn.warn { background:#fffbeb; color:#92400e; border-color:#fde68a; }
    .btn:disabled { opacity:.55; cursor:not-allowed; }
    .toolbar { display:grid; grid-template-columns:1fr auto; gap:8px; margin:12px 0; align-items:center; }
    .batchbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin:8px 0 12px; padding:8px; border:1px dashed #d8d0da; border-radius:10px; background:#fbf9fc; }
    .batchbar .btn { padding:7px 10px; font-size:13px; }
    .hint { color:var(--muted); font-size:12px; }
    .search { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:9px; font-size:15px; outline:none; }
    .status { font-size:13px; color:var(--muted); margin:8px 0; }
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:12px; max-height:calc(100vh - 215px); background:#fff; }
    table { width:100%; min-width:1180px; table-layout:fixed; border-collapse:separate; border-spacing:0; }
    th, td { border-bottom:1px solid var(--line); border-right:1px solid var(--line); padding:7px; vertical-align:middle; font-size:13px; white-space:normal; word-break:break-word; }
    th { position:sticky; top:0; z-index:2; background:#fbf9fc; color:var(--primary); text-align:left; font-weight:800; }
    th:nth-child(1), td:nth-child(1) { width:52px; text-align:center; }
    th:nth-child(2), td:nth-child(2) { width:80px; }
    th:nth-child(3), td:nth-child(3) { width:64px; text-align:center; }
    th:nth-child(4), td:nth-child(4) { width:118px; }
    th:nth-child(5), td:nth-child(5) { width:180px; }
    th:nth-child(6), td:nth-child(6) { width:120px; }
    th:nth-child(7), td:nth-child(7) { width:130px; }
    th:nth-child(8), td:nth-child(8) { width:130px; }
    th:nth-child(9), td:nth-child(9), th:nth-child(10), td:nth-child(10), th:nth-child(11), td:nth-child(11) { width:92px; }
    th:nth-child(12), td:nth-child(12) { width:116px; }
    .th-head { display:flex; align-items:center; justify-content:space-between; gap:6px; min-width:0; }
    .th-head .title { display:block; min-width:0; }
    .filter-btn { flex:0 0 auto; border:1px solid #d8d0da; background:#fff; color:var(--muted); border-radius:7px; padding:4px 7px; font-size:12px; font-weight:800; cursor:pointer; }
    .filter-btn.active { background:var(--primary); border-color:var(--primary); color:#fff; }
    .filter-panel { position:fixed; z-index:20; display:none; width:min(320px, calc(100vw - 24px)); max-height:390px; background:#fff; border:1px solid var(--line); border-radius:10px; box-shadow:0 12px 30px rgba(31,17,33,.18); padding:10px; }
    .filter-panel.open { display:block; }
    .filter-panel-title { color:var(--primary); font-weight:800; margin-bottom:8px; }
    .filter-search { width:100%; padding:8px 9px; border:1px solid var(--line); border-radius:8px; font-size:13px; outline:none; margin-bottom:8px; }
    .filter-options { max-height:220px; overflow:auto; border:1px solid #f0ebf1; border-radius:8px; padding:4px; }
    .filter-option { display:flex; align-items:center; gap:7px; padding:6px; color:var(--text); font-weight:500; cursor:pointer; }
    .filter-option:hover { background:#f7f4f8; }
    .filter-option span { min-width:0; white-space:normal; word-break:break-word; }
    .only-btn { margin-left:auto; border:0; background:#f4f2f5; color:var(--primary); border-radius:7px; padding:4px 7px; font-size:12px; font-weight:800; cursor:pointer; }
    .filter-empty { padding:8px; color:var(--muted); }
    .filter-actions { display:flex; justify-content:space-between; gap:8px; margin-top:9px; }
    .filter-actions .btn { padding:7px 10px; font-size:12px; }
    td input[type="text"], td input[type="number"] { width:100%; min-width:0; padding:7px; border:1px solid transparent; border-radius:7px; font-size:13px; background:#fafafa; }
    td input[type="text"]:focus, td input[type="number"]:focus { outline:none; border-color:var(--primary); background:#fff; }
    .dirty { background:#fff7ed !important; border-color:#fdba74 !important; }
    .error { color:var(--danger); font-weight:700; }
    .ok { color:var(--ok); font-weight:700; }
    .pill { display:inline-flex; align-items:center; gap:5px; padding:4px 8px; border-radius:99px; background:#f4f2f5; }
    .new-row td { background:#fffbeb; }
    .new-row input { border-color:#facc15 !important; background:#fff !important; }
    .inline-actions { display:flex; gap:5px; flex-wrap:wrap; margin-top:6px; }
    .inline-actions .btn { padding:5px 7px; border-radius:7px; font-size:12px; }
    @media (max-width: 700px) {
      body { padding:8px; }
      .toolbar { grid-template-columns:1fr; }
      .table-wrap { max-height:calc(100vh - 260px); }
      .batchbar { gap:6px; }
      .batchbar .btn { padding:7px 9px; }
      .filter-panel { max-height:320px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <h1>商品表管理</h1>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn" onclick="location.href='index.html'">← 返回首页</button>
        <button class="btn" onclick="loadProducts()">刷新</button>
        <button id="addProductBtn" class="btn" onclick="openInlineProductRow()">添加商品</button>
        <button class="btn primary" onclick="saveAllDirty()">保存修改</button>
      </div>
    </div>

    <div class="toolbar">
      <input id="globalSearch" class="search" placeholder="全局搜索：条码 / 商品名 / 品牌 / 规格 / 口味 / 单位" oninput="applyFilters()">
      <button class="btn" onclick="clearFilters()">清空筛选</button>
    </div>

    <div class="batchbar">
      <button class="btn" onclick="selectVisibleRows(true)">全选当前筛选</button>
      <button class="btn" onclick="selectVisibleRows(false)">取消选择</button>
      <button class="btn warn" onclick="batchMove('top')">选中置顶</button>
      <button class="btn" onclick="batchMove('up')">上移</button>
      <button class="btn" onclick="batchMove('down')">下移</button>
      <button class="btn warn" onclick="batchMove('bottom')">选中置底</button>
      <span class="hint">排序越小越靠前；多选后批量移动，最后点“保存修改”。</span>
    </div>

    <div id="status" class="status">正在加载商品...</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>选择</th>
            <th><div class="th-head"><span class="title">排序</span><button id="filterBtn_sort_order" class="filter-btn" onclick="toggleFilterPanel(event,'sort_order')">筛选</button></div></th>
            <th><div class="th-head"><span class="title">启用</span><button id="filterBtn_is_active" class="filter-btn" onclick="toggleFilterPanel(event,'is_active')">筛选</button></div></th>
            <th><div class="th-head"><span class="title">条形码</span><button id="filterBtn_barcode" class="filter-btn" onclick="toggleFilterPanel(event,'barcode')">筛选</button></div></th>
            <th><div class="th-head"><span class="title">商品名称</span><button id="filterBtn_name" class="filter-btn" onclick="toggleFilterPanel(event,'name')">筛选</button></div></th>
            <th><div class="th-head"><span class="title">品牌</span><button id="filterBtn_brand" class="filter-btn" onclick="toggleFilterPanel(event,'brand')">筛选</button></div></th>
            <th><div class="th-head"><span class="title">规格</span><button id="filterBtn_spec" class="filter-btn" onclick="toggleFilterPanel(event,'spec')">筛选</button></div></th>
            <th><div class="th-head"><span class="title">口味/简称</span><button id="filterBtn_flavor" class="filter-btn" onclick="toggleFilterPanel(event,'flavor')">筛选</button></div></th>
            <th><div class="th-head"><span class="title">默认散件价</span><button id="filterBtn_default_price" class="filter-btn" onclick="toggleFilterPanel(event,'default_price')">筛选</button></div></th>
            <th><div class="th-head"><span class="title">件装数</span><button id="filterBtn_pcs_per_case" class="filter-btn" onclick="toggleFilterPanel(event,'pcs_per_case')">筛选</button></div></th>
            <th><div class="th-head"><span class="title">盒装数</span><button id="filterBtn_pcs_per_box" class="filter-btn" onclick="toggleFilterPanel(event,'pcs_per_box')">筛选</button></div></th>
            <th><div class="th-head"><span class="title">散件单位</span><button id="filterBtn_unit" class="filter-btn" onclick="toggleFilterPanel(event,'unit')">筛选</button></div></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
  <div id="filterPanel" class="filter-panel"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://wyjbnnqhiehjccmojbbg.supabase.co";
const SUPABASE_KEY = "sb_publishable_WwTC7079N2e8ZQwPKUj-Gw_ewFiviFG";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let products = [];
let filtered = [];
let openFilterField = '';
let filterSearchText = '';
let showInlineNewProduct = false;
let creatingProduct = false;
const dirtyMap = new Map();
const selectedIds = new Set();

const editableFields = ['sort_order','barcode','name','brand','spec','flavor','default_price','pcs_per_case','pcs_per_box','unit','is_active'];
const filterFields = ['sort_order','is_active','barcode','name','brand','spec','flavor','default_price','pcs_per_case','pcs_per_box','unit'];
const filterLabels = {
  sort_order: '排序', is_active: '启用', barcode: '条形码', name: '商品名称', brand: '品牌', spec: '规格', flavor: '口味/简称',
  default_price: '默认散件价', pcs_per_case: '件装数', pcs_per_box: '盒装数', unit: '散件单位'
};
const columnFilters = Object.fromEntries(filterFields.map(field => [field, null]));

function setStatus(msg, cls='') {
  const el = document.getElementById('status');
  el.className = 'status ' + cls;
  el.textContent = msg;
}

function esc(v) {
  return String(v ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
}

function getTrimmed(id) {
  return document.getElementById(id).value.trim();
}

function toNumber(id, fallback) {
  const text = getTrimmed(id);
  if (text === '') return fallback;
  const num = Number(text);
  return Number.isFinite(num) ? num : fallback;
}

function productSortValue(p) {
  const n = Number(p.sort_order);
  if (Number.isFinite(n) && n > 0) return n;
  const idNum = Number(p.id);
  return Number.isFinite(idNum) ? idNum * 10 : 999999;
}

function compareProductOrder(a, b) {
  const bySort = productSortValue(a) - productSortValue(b);
  if (bySort !== 0) return bySort;
  return Number(a.id || 0) - Number(b.id || 0);
}

function sortProductsInMemory() {
  products.sort(compareProductOrder);
}

async function loadProducts() {
  setStatus('正在加载商品...');
  dirtyMap.clear();
  selectedIds.clear();
  showInlineNewProduct = false;
  updateAddProductButton();
  closeFilterPanel();
  const { data, error } = await client
    .from('products')
    .select('id, sort_order, barcode, name, brand, spec, flavor, default_price, pcs_per_case, pcs_per_box, unit, is_active, created_at')
    .order('sort_order', { ascending: true })
    .order('id', { ascending: true });
  if (error) {
    console.error(error);
    setStatus('加载失败：' + error.message + '。如果提示 sort_order 不存在，请先执行配套 SQL。', 'error');
    return;
  }
  products = (data || []).map(p => ({ ...p, sort_order: Number(p.sort_order || 0), unit: p.unit || '个' }));
  sortProductsInMemory();
  applyFilters();
}

function getFilter(id) { return document.getElementById(id).value.trim(); }

function getFilterKey(p, field) {
  if (field === 'is_active') return p.is_active ? 'true' : 'false';
  return String(p[field] ?? '');
}

function displayFilterValue(field, key) {
  if (field === 'is_active') return key === 'true' ? '启用' : '停用';
  return key === '' ? '(空白)' : key;
}

function productMatches(p, excludeField='') {
  const global = getFilter('globalSearch').toLowerCase();
  const blob = [p.sort_order,p.barcode,p.name,p.brand,p.spec,p.flavor,p.unit].map(x => String(x||'').toLowerCase()).join(' ');
  if (global && !blob.includes(global)) return false;

  for (const field of filterFields) {
    if (field === excludeField) continue;
    const selected = columnFilters[field];
    if (selected !== null && !selected.has(getFilterKey(p, field))) return false;
  }
  return true;
}

function applyFilters() {
  sortProductsInMemory();
  filtered = products.filter(p => productMatches(p));
  renderTable();
  updateFilterButtons();
  if (openFilterField) renderFilterPanel(openFilterField);
}

function clearFilters() {
  document.getElementById('globalSearch').value = '';
  filterFields.forEach(field => columnFilters[field] = null);
  filterSearchText = '';
  closeFilterPanel();
  applyFilters();
}

function updateFilterButtons() {
  filterFields.forEach(field => {
    const btn = document.getElementById('filterBtn_' + field);
    if (!btn) return;
    const selected = columnFilters[field];
    const active = selected !== null;
    btn.classList.toggle('active', active);
    btn.textContent = active ? `已选${selected.size}` : '筛选';
  });
}

function getFilterOptions(field) {
  const map = new Map();
  products.filter(p => productMatches(p, field)).forEach(p => {
    const key = getFilterKey(p, field);
    map.set(key, displayFilterValue(field, key));
  });
  return Array.from(map.entries()).sort((a, b) => a[1].localeCompare(b[1], 'zh-Hans-CN', { numeric: true }));
}

function toggleFilterPanel(event, field) {
  event.stopPropagation();
  if (openFilterField === field) {
    closeFilterPanel();
    return;
  }
  openFilterField = field;
  filterSearchText = '';
  renderFilterPanel(field);
  positionFilterPanel(event.currentTarget);
}

function positionFilterPanel(button) {
  const panel = document.getElementById('filterPanel');
  const rect = button.getBoundingClientRect();
  const gap = 6;
  const left = Math.min(rect.left, window.innerWidth - panel.offsetWidth - 8);
  panel.style.left = Math.max(8, left) + 'px';
  panel.style.top = Math.min(rect.bottom + gap, window.innerHeight - panel.offsetHeight - 8) + 'px';
}

function renderFilterPanel(field) {
  const panel = document.getElementById('filterPanel');
  const selected = columnFilters[field];
  const q = filterSearchText.toLowerCase();
  const options = getFilterOptions(field).filter(([, label]) => !q || label.toLowerCase().includes(q));
  const optionHtml = options.length ? options.map(([key, label]) => `
    <label class="filter-option">
      <input type="checkbox" data-field="${esc(field)}" data-key="${esc(key)}" ${selected === null || selected.has(key) ? 'checked' : ''} onchange="toggleFilterValueFromInput(this)">
      <span>${esc(label)}</span>
      <button type="button" class="only-btn" data-field="${esc(field)}" data-key="${esc(key)}" onclick="onlyFilterValueFromButton(event,this)">只看</button>
    </label>
  `).join('') : '<div class="filter-empty">没有可选项</div>';

  panel.innerHTML = `
    <div class="filter-panel-title">${esc(filterLabels[field])}</div>
    <input class="filter-search" placeholder="搜索此列" value="${esc(filterSearchText)}" oninput="filterSearchText=this.value; renderFilterPanel('${esc(field)}')" onclick="event.stopPropagation()">
    <div class="filter-options">${optionHtml}</div>
    <div class="filter-actions">
      <button class="btn" onclick="selectAllFilterValues('${esc(field)}')">全选</button>
      <button class="btn" onclick="clearColumnSelection('${esc(field)}')">清空选择</button>
      <button class="btn primary" onclick="closeFilterPanel()">确定</button>
    </div>
  `;
  panel.classList.add('open');
}

function toggleFilterValueFromInput(input) {
  toggleFilterValue(input.dataset.field, input.dataset.key, input.checked);
}

function onlyFilterValueFromButton(event, button) {
  event.stopPropagation();
  onlyFilterValue(button.dataset.field, button.dataset.key);
}

function toggleFilterValue(field, key, checked) {
  let selected = columnFilters[field];
  if (selected === null) {
    selected = new Set(getFilterOptions(field).map(([optionKey]) => optionKey));
    columnFilters[field] = selected;
  }
  if (checked) selected.add(key);
  else selected.delete(key);

  const allKeys = getFilterOptions(field).map(([optionKey]) => optionKey);
  if (allKeys.length > 0 && selected.size === allKeys.length && allKeys.every(optionKey => selected.has(optionKey))) columnFilters[field] = null;
  applyFilters();
}

function onlyFilterValue(field, key) {
  columnFilters[field] = new Set([key]);
  applyFilters();
}

function selectAllFilterValues(field) {
  columnFilters[field] = null;
  applyFilters();
}

function clearColumnSelection(field) {
  columnFilters[field] = new Set();
  applyFilters();
}

function closeFilterPanel() {
  openFilterField = '';
  const panel = document.getElementById('filterPanel');
  panel.classList.remove('open');
  panel.innerHTML = '';
}

document.addEventListener('click', event => {
  const panel = document.getElementById('filterPanel');
  if (!panel.contains(event.target) && !event.target.closest('.filter-btn')) closeFilterPanel();
});
window.addEventListener('resize', closeFilterPanel);

function markDirty(id, field, value) {
  const original = products.find(p => String(p.id) === String(id));
  if (!original) return;
  let normalized = value;
  if (['sort_order','default_price','pcs_per_case','pcs_per_box'].includes(field)) normalized = value === '' ? null : Number(value);
  if (field === 'is_active') normalized = !!value;
  original[field] = normalized;

  if (!dirtyMap.has(String(id))) dirtyMap.set(String(id), {});
  const patch = dirtyMap.get(String(id));
  patch[field] = normalized;

  const el = document.querySelector(`[data-id="${CSS.escape(String(id))}"][data-field="${field}"]`);
  if (el) el.classList.add('dirty');
  setStatus(`已修改 ${dirtyMap.size} 条，已选择 ${selectedIds.size} 条，记得保存。`);
}

function markSortDirty(product, sortOrder) {
  const id = String(product.id);
  product.sort_order = sortOrder;
  if (!dirtyMap.has(id)) dirtyMap.set(id, {});
  dirtyMap.get(id).sort_order = sortOrder;
}

function renderInput(p, field, type='text') {
  const val = p[field] ?? '';
  return `<input data-id="${esc(p.id)}" data-field="${field}" type="${type}" value="${esc(val)}" onchange="markDirty('${esc(p.id)}','${field}',this.value)">`;
}

function renderNewProductRow() {
  if (!showInlineNewProduct) return '';
  const nextSort = products.length ? Math.max(...products.map(productSortValue)) + 10 : 10;
  return `
    <tr class="new-row">
      <td>新增</td>
      <td><input id="new_sort_order" type="number" step="1" value="${esc(nextSort)}"></td>
      <td><input id="new_is_active" type="checkbox" checked></td>
      <td><input id="new_barcode" type="text" autocomplete="off" placeholder="必填"></td>
      <td><input id="new_name" type="text" autocomplete="off" placeholder="必填"></td>
      <td><input id="new_brand" type="text" autocomplete="off"></td>
      <td><input id="new_spec" type="text" autocomplete="off"></td>
      <td><input id="new_flavor" type="text" autocomplete="off"></td>
      <td><input id="new_default_price" type="number" step="0.01" value="0"></td>
      <td><input id="new_pcs_per_case" type="number" step="1" value="1"></td>
      <td><input id="new_pcs_per_box" type="number" step="1" value="0"></td>
      <td>
        <input id="new_unit" type="text" value="个" autocomplete="off">
        <div class="inline-actions">
          <button id="createProductBtn" class="btn primary" onclick="createProduct()">提交</button>
          <button class="btn" onclick="cancelInlineProductRow()">取消</button>
        </div>
      </td>
    </tr>
  `;
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  const rows = filtered.map(p => `
    <tr>
      <td><input type="checkbox" ${selectedIds.has(String(p.id)) ? 'checked' : ''} onchange="toggleRowSelected('${esc(p.id)}',this.checked)"></td>
      <td>${renderInput(p,'sort_order','number')}</td>
      <td><input data-id="${esc(p.id)}" data-field="is_active" type="checkbox" ${p.is_active ? 'checked' : ''} onchange="markDirty('${esc(p.id)}','is_active',this.checked)"></td>
      <td class="barcode">${renderInput(p,'barcode')}</td>
      <td class="name">${renderInput(p,'name')}</td>
      <td>${renderInput(p,'brand')}</td>
      <td>${renderInput(p,'spec')}</td>
      <td>${renderInput(p,'flavor')}</td>
      <td class="small">${renderInput(p,'default_price','number')}</td>
      <td class="small">${renderInput(p,'pcs_per_case','number')}</td>
      <td class="small">${renderInput(p,'pcs_per_box','number')}</td>
      <td>${renderInput(p,'unit')}</td>
    </tr>
  `).join('');
  tbody.innerHTML = renderNewProductRow() + rows;
  updateAddProductButton();
  setStatus(`共 ${products.length} 条，当前筛选 ${filtered.length} 条，已选择 ${selectedIds.size} 条。未保存修改 ${dirtyMap.size} 条。`);
}

function toggleRowSelected(id, checked) {
  if (checked) selectedIds.add(String(id));
  else selectedIds.delete(String(id));
  setStatus(`共 ${products.length} 条，当前筛选 ${filtered.length} 条，已选择 ${selectedIds.size} 条。未保存修改 ${dirtyMap.size} 条。`);
}

function selectVisibleRows(checked) {
  if (checked) filtered.forEach(p => selectedIds.add(String(p.id)));
  else selectedIds.clear();
  renderTable();
}

function batchMove(action) {
  if (selectedIds.size === 0) {
    setStatus('请先勾选要排序的商品。', 'error');
    return;
  }

  const ordered = [...products].sort(compareProductOrder);
  let newOrder = [...ordered];

  if (action === 'top') {
    const selected = newOrder.filter(p => selectedIds.has(String(p.id)));
    const rest = newOrder.filter(p => !selectedIds.has(String(p.id)));
    newOrder = [...selected, ...rest];
  } else if (action === 'bottom') {
    const selected = newOrder.filter(p => selectedIds.has(String(p.id)));
    const rest = newOrder.filter(p => !selectedIds.has(String(p.id)));
    newOrder = [...rest, ...selected];
  } else if (action === 'up') {
    for (let i = 1; i < newOrder.length; i++) {
      const curSelected = selectedIds.has(String(newOrder[i].id));
      const prevSelected = selectedIds.has(String(newOrder[i - 1].id));
      if (curSelected && !prevSelected) [newOrder[i - 1], newOrder[i]] = [newOrder[i], newOrder[i - 1]];
    }
  } else if (action === 'down') {
    for (let i = newOrder.length - 2; i >= 0; i--) {
      const curSelected = selectedIds.has(String(newOrder[i].id));
      const nextSelected = selectedIds.has(String(newOrder[i + 1].id));
      if (curSelected && !nextSelected) [newOrder[i], newOrder[i + 1]] = [newOrder[i + 1], newOrder[i]];
    }
  }

  newOrder.forEach((p, index) => {
    const nextSort = (index + 1) * 10;
    if (Number(p.sort_order || 0) !== nextSort) markSortDirty(p, nextSort);
  });

  products = newOrder;
  applyFilters();
  setStatus(`已批量调整排序，影响 ${dirtyMap.size} 条，点击“保存修改”后生效。`, 'ok');
}

function updateAddProductButton() {
  const btn = document.getElementById('addProductBtn');
  if (!btn) return;
  btn.disabled = showInlineNewProduct || creatingProduct;
  btn.textContent = showInlineNewProduct ? '正在添加' : '添加商品';
}

function openInlineProductRow() {
  closeFilterPanel();
  if (showInlineNewProduct) {
    const input = document.getElementById('new_barcode');
    if (input) input.focus();
    return;
  }
  showInlineNewProduct = true;
  renderTable();
  setStatus('请在列表最上方填写新商品，条形码和商品名称必填。');
  setTimeout(() => {
    const wrap = document.querySelector('.table-wrap');
    if (wrap) wrap.scrollTop = 0;
    const input = document.getElementById('new_barcode');
    if (input) input.focus();
  }, 0);
}

function cancelInlineProductRow() {
  if (creatingProduct) return;
  showInlineNewProduct = false;
  renderTable();
}

async function createProduct() {
  const btn = document.getElementById('createProductBtn');
  const payload = {
    sort_order: toNumber('new_sort_order', products.length ? Math.max(...products.map(productSortValue)) + 10 : 10),
    barcode: getTrimmed('new_barcode'),
    name: getTrimmed('new_name'),
    brand: getTrimmed('new_brand'),
    spec: getTrimmed('new_spec'),
    flavor: getTrimmed('new_flavor'),
    default_price: toNumber('new_default_price', 0),
    pcs_per_case: toNumber('new_pcs_per_case', 1),
    pcs_per_box: toNumber('new_pcs_per_box', 0),
    unit: getTrimmed('new_unit') || '个',
    is_active: document.getElementById('new_is_active').checked
  };
  if (!payload.barcode || !payload.name) {
    setStatus('新增失败：条形码和商品名称不能为空。', 'error');
    return;
  }

  creatingProduct = true;
  updateAddProductButton();
  if (btn) {
    btn.disabled = true;
    btn.textContent = '提交中';
  }

  const { data, error } = await client
    .from('products')
    .insert(payload)
    .select('id, sort_order, barcode, name, brand, spec, flavor, default_price, pcs_per_case, pcs_per_box, unit, is_active, created_at')
    .single();

  creatingProduct = false;

  if (error) {
    console.error(error);
    if (btn) {
      btn.disabled = false;
      btn.textContent = '提交';
    }
    updateAddProductButton();
    setStatus('新增失败：' + error.message, 'error');
    return;
  }

  products.push({ ...data, sort_order: Number(data.sort_order || 0), unit: data.unit || '个' });
  showInlineNewProduct = false;
  setStatus('已添加：' + (data.name || data.barcode), 'ok');
  applyFilters();
}

async function saveRow(id) {
  const patch = dirtyMap.get(String(id));
  if (!patch) return;
  const cleanPatch = {};
  editableFields.forEach(k => { if (Object.prototype.hasOwnProperty.call(patch, k)) cleanPatch[k] = patch[k]; });
  if (Object.prototype.hasOwnProperty.call(cleanPatch, 'unit') && String(cleanPatch.unit || '').trim() === '') cleanPatch.unit = '个';

  const { data, error } = await client.from('products').update(cleanPatch).eq('id', id).select('id, sort_order, barcode, name, brand, spec, flavor, default_price, pcs_per_case, pcs_per_box, unit, is_active, created_at').single();
  if (error) {
    console.error(error);
    setStatus('保存失败：' + error.message, 'error');
    return;
  }
  const idx = products.findIndex(p => String(p.id) === String(id));
  if (idx >= 0) products[idx] = { ...products[idx], ...data };
  dirtyMap.delete(String(id));
  setStatus('已保存：' + (data.name || data.barcode), 'ok');
  applyFilters();
}

async function saveAllDirty() {
  const ids = Array.from(dirtyMap.keys());
  if (ids.length === 0) { setStatus('没有需要保存的修改。'); return; }
  setStatus(`正在保存 ${ids.length} 条...`);
  for (const id of ids) {
    await saveRow(id);
  }
  setStatus('全部修改已保存。', 'ok');
  loadProducts();
}

loadProducts();
</script>
